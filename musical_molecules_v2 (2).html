<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Molecules</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js for force-directed graph/physics -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .node circle { stroke: #fff; stroke-width: 2px; cursor: pointer; transition: stroke 0.2s, stroke-width 0.2s; }
        .node.selected circle { stroke: #fbbf24; stroke-width: 5px; } /* Amber-400 for selection */
        .node text { pointer-events: none; font-weight: bold; font-family: sans-serif; }
        .link { stroke: #9ca3af; stroke-width: 4px; stroke-linecap: round; }
        
        /* Custom animation for toast messages */
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .toast { animation: fadeOut 2s forwards; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">Musical Molecules 🎵🧪</h1>
            <p class="text-indigo-200 text-sm">Learn chemistry by hearing bonds form!</p>
        </div>
        <button id="resetBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded shadow transition flex items-center gap-2 font-semibold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            Clear Canvas
        </button>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex flex-col md:flex-row relative">
        
        <!-- Controls Sidebar -->
        <div class="w-full md:w-64 bg-white shadow-lg p-6 flex flex-col gap-4 z-10 overflow-y-auto">
            <div class="bg-blue-50 border border-blue-200 p-3 rounded text-sm text-blue-800 mb-2">
                <strong>How to play:</strong><br>
                1. Click any element below to start.<br>
                2. Click an atom on the canvas to select it (yellow ring).<br>
                3. Click elements below to attach them!
            </div>
            
            <button onclick="addAtom('H')" class="flex items-center justify-between bg-gray-100 hover:bg-gray-200 text-gray-800 p-3 rounded-lg border border-gray-300 transition">
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-white border border-gray-400 flex items-center justify-center text-xs font-bold">H</span>
                    Hydrogen
                </span>
                <span class="text-xs text-gray-500">Max: 1</span>
            </button>
            
            <button onclick="addAtom('O')" class="flex items-center justify-between bg-red-50 hover:bg-red-100 text-red-800 p-3 rounded-lg border border-red-200 transition">
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-red-500 text-white flex items-center justify-center text-xs font-bold">O</span>
                    Oxygen
                </span>
                <span class="text-xs text-red-500">Max: 2</span>
            </button>

            <button onclick="addAtom('N')" class="flex items-center justify-between bg-blue-50 hover:bg-blue-100 text-blue-800 p-3 rounded-lg border border-blue-200 transition">
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">N</span>
                    Nitrogen
                </span>
                <span class="text-xs text-blue-500">Max: 3</span>
            </button>

            <button onclick="addAtom('C')" class="flex items-center justify-between bg-gray-700 hover:bg-gray-800 text-white p-3 rounded-lg border border-gray-900 transition mt-2">
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded-full bg-gray-900 text-white flex items-center justify-center text-xs font-bold border border-gray-600">C</span>
                    Carbon
                </span>
                <span class="text-xs text-gray-300">Max: 4</span>
            </button>

            <div id="statsBox" class="mt-auto pt-4 border-t border-gray-200 text-sm text-gray-600">
                Formula: <span id="formula" class="font-bold text-indigo-600 tracking-wide"><em>Empty</em></span>
            </div>
        </div>

        <!-- Canvas Area -->
        <div id="canvasContainer" class="flex-1 bg-gray-50 relative cursor-crosshair">
            <!-- SVG injected by D3 -->
            
            <!-- Toast Container -->
            <div id="toastContainer" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 pointer-events-none z-50"></div>
        </div>
    </div>

    <script>
        // --- DATA & CONFIGURATION ---
        const elements = {
            'H': { valency: 1, color: '#ffffff', textColor: '#374151', radius: 15, mass: 1 },
            'O': { valency: 2, color: '#ef4444', textColor: '#ffffff', radius: 22, mass: 16 },
            'N': { valency: 3, color: '#3b82f6', textColor: '#ffffff', radius: 24, mass: 14 },
            'C': { valency: 4, color: '#1f2937', textColor: '#ffffff', radius: 26, mass: 12 }
        };

        let nodes = [];
        let links = [];
        let nodeIdCounter = 0;
        let selectedNodeId = null;

        // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type, element = null) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'success') {
                let baseFreq = 440; // A4
                if (element === 'H') baseFreq = 880; 
                if (element === 'O') baseFreq = 523.25; 
                if (element === 'N') baseFreq = 659.25; 
                if (element === 'C') baseFreq = 329.63; 

                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, now);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            } 
            else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'select') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            }
            else if (type === 'clear') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        // --- UI UTILS ---
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const bgColor = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-blue-500' : 'bg-green-500');
            toast.className = `toast px-4 py-2 rounded shadow-lg text-white font-semibold text-sm ${bgColor}`;
            toast.textContent = message;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function updateFormula() {
            const counts = { C: 0, H: 0, N: 0, O: 0 };
            nodes.forEach(n => counts[n.element]++);
            
            let formula = '';
            ['C', 'H', 'N', 'O'].forEach(el => {
                if (counts[el] > 0) {
                    formula += el + (counts[el] > 1 ? `<sub>${counts[el]}</sub>` : '');
                }
            });
            document.getElementById('formula').innerHTML = formula || '<em>Empty</em>';
        }

        // --- GRAPH PHYSICS (D3.js) ---
        const container = document.getElementById('canvasContainer');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select("#canvasContainer")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%");

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(60))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(d => elements[d.element].radius + 5));

        let linkSelection = svg.append("g").attr("class", "links").selectAll(".link");
        let nodeSelection = svg.append("g").attr("class", "nodes").selectAll(".node");

        function initializeGraph() {
            nodes = []; // Start completely empty!
            links = [];
            selectedNodeId = null;
            updateGraph();
        }

        function getValencyUsed(nodeId) {
            return links.reduce((acc, link) => {
                const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;
                if (sourceId === nodeId || targetId === nodeId) return acc + 1;
                return acc;
            }, 0);
        }

        function addAtom(elementType) {
            initAudio(); 

            // IF CANVAS IS EMPTY: Just drop the atom in the center!
            if (nodes.length === 0) {
                const width = container.clientWidth;
                const height = container.clientHeight;
                const newNode = { 
                    id: nodeIdCounter++, 
                    element: elementType,
                    x: width / 2,
                    y: height / 2
                };
                nodes.push(newNode);
                selectedNodeId = newNode.id; // Auto-select it
                playSound('success', elementType);
                updateGraph();
                return;
            }

            // IF CANVAS HAS ATOMS: Require a selection to bond to
            if (selectedNodeId === null) {
                showToast("Please select an atom on the canvas to bond to first!", "error");
                playSound('error');
                return;
            }

            const targetNode = nodes.find(n => n.id === selectedNodeId);
            if (!targetNode) return;

            const maxValency = elements[targetNode.element].valency;
            const currentBonds = getValencyUsed(selectedNodeId);

            if (currentBonds >= maxValency) {
                showToast(`${targetNode.element} can only form ${maxValency} bond(s)! Valency full.`, "error");
                playSound('error');
                return;
            }

            // Create new node and link
            const newNode = { 
                id: nodeIdCounter++, 
                element: elementType,
                x: targetNode.x + (Math.random() - 0.5) * 20,
                y: targetNode.y + (Math.random() - 0.5) * 20
            };
            nodes.push(newNode);
            
            links.push({
                source: targetNode.id,
                target: newNode.id
            });

            playSound('success', elementType);
            
            // Auto-select the newly added atom if it's not Hydrogen (makes building faster)
            if(elementType !== 'H') {
                selectedNodeId = newNode.id;
            }

            updateGraph();
        }

        function updateGraph() {
            // Update Links
            linkSelection = linkSelection.data(links, d => d.source.id + "-" + d.target.id);
            linkSelection.exit().remove();
            const linkEnter = linkSelection.enter().append("line").attr("class", "link");
            linkSelection = linkEnter.merge(linkSelection);

            // Update Nodes
            nodeSelection = nodeSelection.data(nodes, d => d.id);
            nodeSelection.exit().remove();

            const nodeEnter = nodeSelection.enter()
                .append("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (event, d) => {
                    selectedNodeId = d.id;
                    playSound('select');
                    updateGraph(); 
                });

            nodeEnter.append("circle")
                .attr("r", d => elements[d.element].radius)
                .attr("fill", d => elements[d.element].color);

            nodeEnter.append("text")
                .attr("dy", 5) 
                .attr("text-anchor", "middle")
                .attr("fill", d => elements[d.element].textColor)
                .text(d => d.element);

            nodeSelection = nodeEnter.merge(nodeSelection);
            nodeSelection.classed("selected", d => d.id === selectedNodeId);

            simulation.nodes(nodes).on("tick", ticked);
            simulation.force("link").links(links);
            simulation.alpha(1).restart();

            updateFormula();
        }

        function ticked() {
            linkSelection
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            nodeSelection
                .attr("transform", d => `translate(${d.x},${d.y})`);
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
            selectedNodeId = d.id;
            updateGraph();
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            svg.attr("width", width).attr("height", height);
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            initializeGraph();
            playSound('clear');
            showToast("Canvas Cleared", "info");
        });

        // Kickoff with an empty canvas
        initializeGraph();

    </script>
</body>
</html>
